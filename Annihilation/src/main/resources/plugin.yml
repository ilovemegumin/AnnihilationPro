name: Annihilation
main: vip.megumin.anniPro.main.AnnihilationMain
version: 1.5.5
authors: [Mr_Little_Kitty]
description: A plugin for playing the game of Annihilation
commands:
  Anni:
    description: provides commands for the Annihilation game
  Team:
    description: Command related to annihilation team
  Area:
    description: Command for managing annihilation areas
  Vote:
    description: Allows players to vote for a map in annihilation
  Kit:
    description: Opens the kit menu for the player
  MyXP:
    description: Shows the player's Annihilation XP
  Shop:
    description: Opens the kit shop
  profile:
    description: Shows Annihilation player statistics
permissions:
  A.anni:
    description: gives permission to use the anni command
    default: op
  A.anni.start:
    description: allows starting an Annihilation game
    default: op
  A.anni.stop:
    description: allows stopping an Annihilation game
    default: op
  A.anni.nexus:
    description: allows changing team nexus HP
    default: op
  A.anni.save:
    description: allows saving map config and world files
    default: op
  A.anni.mapbuilder:
    description: allows receiving mapbuilder setup items
    default: op
  A.Area:
    description: gives permission to use the anni command
    default: op
  Anni.ChangeKit:
    description: allows a player to change their kit with a command
    default: op
  Anni.JoinPhase.3:
    default: false
  Anni.JoinPhase.4:
    default: false
  Anni.JoinPhase.5:
    default: false
  Anni.BypassJoin:
    default: false
